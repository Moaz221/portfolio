  <script>
    (function() {
      const canvas = document.getElementById('bg-canvas');

      let W, H, particles = [], matrixDrops = [], codeSnippets = [];

        const count = isMobile ? Math.min(30, ~~(W*H/30000)) : Math.min(70, ~~(W*H/15000));

          x: Math.random()*W, y: Math.random()*H,

        }));
      }

        if (isMobile) { matrixDrops = []; return; }
        const cols = ~~(W/25);
        matrixDrops = [];

          if (Math.random() > .75) {
            const len = ~~(Math.random()*12)+4;
            matrixDrops.push({
              x: i*25, y: Math.random()*H,
              speed: Math.random()*1.5+.8,
              chars: Array.from({length: len}, () => matrixChars[~~(Math.random()*matrixChars.length)]),
              len, o: Math.random()*.25+.08
            });
          }
        }
      }

      function initCode() {
        if (isMobile) { codeSnippets = []; return; }
        const snips = ['fun main()','class App','val data','suspend','@Composable','LazyColumn','ViewModel','Flow<T>','sealed','interface'];
        codeSnippets = Array.from({length: 6}, () => ({
          text: snips[~~(Math.random()*snips.length)],
          x: Math.random()*W, y: Math.random()*H,
          vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
          o: Math.random()*.12+.04, size: ~~(Math.random()*4)+10
        }));
      }

      function dist(a,b,c,d) { return Math.sqrt((c-a)**2+(d-b)**2); }

      function draw() {
        ctx.fillStyle = 'rgba(10,10,15,.12)';
        ctx.fillRect(0,0,W,H);

        // Matrix
        ctx.font = '14px JetBrains Mono,monospace';
        matrixDrops.forEach(d => {
          d.y += d.speed;
          if (d.y - d.len*20 > H) { d.y = -d.len*20; d.x = ~~(Math.random()*(W/25))*25; }
          d.chars.forEach((c,i) => {
            const y = d.y - i*20;
            if (y > 0 && y < H) {
              const fo = i===0 ? d.o*2.5 : d.o*(1-i/d.len);
              ctx.fillStyle = `rgba(61,220,132,${Math.min(fo,1)})`;
              ctx.fillText(c, d.x, y);
              if (Math.random()>.98) d.chars[i] = matrixChars[~~(Math.random()*matrixChars.length)];
            }
          });
        });

        // Connections
        const maxD = isMobile ? 100 : 140;
        const mouseR = 180;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i+1; j < particles.length; j++) {
            const d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
            if (d < maxD) {
              const op = (1-d/maxD)*.25;
              const mdi = dist(particles[i].x, particles[i].y, mouseX, mouseY);
              const mdj = dist(particles[j].x, particles[j].y, mouseX, mouseY);
              ctx.strokeStyle = (mdi < mouseR || mdj < mouseR)
                ? `rgba(61,220,132,${op*2.5})`
                : `rgba(61,220,132,${op})`;
              ctx.lineWidth = (mdi < mouseR || mdj < mouseR) ? 1.2 : .5;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        // Particles
        particles.forEach(p => {
          p.p += .018;
          const md = dist(p.x, p.y, mouseX, mouseY);
          if (md < 140) {
            const ang = Math.atan2(p.y-mouseY, p.x-mouseX);
            p.vx += Math.cos(ang)*.4;
            p.vy += Math.sin(ang)*.4;
          }
          p.x += p.vx; p.y += p.vy;
          p.vx *= .99; p.vy *= .99;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;
          p.x = Math.max(0, Math.min(W, p.x));
          p.y = Math.max(0, Math.min(H, p.y));

          const pr = p.r + Math.sin(p.p)*.4;
          if (p.bright || md < 140) {
            const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,pr*3);
            g.addColorStop(0, `rgba(61,220,132,${p.o})`);
            g.addColorStop(1, 'rgba(61,220,132,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(p.x, p.y, pr*3, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = `rgba(61,220,132,${p.bright ? p.o+.25 : p.o})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, pr, 0, Math.PI*2);
          ctx.fill();
        });

        // Code snippets
        codeSnippets.forEach(s => {
          s.x += s.vx; s.y += s.vy;
          if (s.x < -100) s.x = W+100;
          if (s.x > W+100) s.x = -100;
          if (s.y < -50) s.y = H+50;
          if (s.y > H+50) s.y = -50;
          const md = dist(s.x, s.y, mouseX, mouseY);
          ctx.font = `${s.size}px JetBrains Mono,monospace`;
          ctx.fillStyle = `rgba(199,146,234,${md<200 ? s.o*2 : s.o})`;
          ctx.fillText(s.text, s.x, s.y);
        });

        // Mouse glow
        if (mouseX > 0) {
          const g = ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,90);
          g.addColorStop(0, 'rgba(61,220,132,.08)');
          g.addColorStop(1, 'rgba(61,220,132,0)');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(mouseX, mouseY, 90, 0, Math.PI*2);
          ctx.fill();
        }

        animId = requestAnimationFrame(draw);
      }

      function resetIdle() {
        idle = false;
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { idle = true; }, 5000);
      }

      document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; resetIdle(); });
      document.addEventListener('touchmove', e => { if (e.touches[0]) { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; resetIdle(); } });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) cancelAnimationFrame(animId);
        else draw();
      });
      window.addEventListener('resize', resize);
      window.addEventListener('load', () => { resize(); ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H); draw(); });
    })();
  </script>

    /* ========== Contact Form ==========
       Includes a honeypot field ("_gotcha"): it is invisible and unreachable
       to real visitors (off-screen + not tab-focusable), but a form-filling
       bot will typically fill in every input it finds. If that field arrives
       non-empty, Formspree silently discards the submission as spam. */
    const ContactForm = () => {
      const [form, setForm] = useState({name:'', email:'', message:'', _gotcha:''});
      const [status, setStatus] = useState('idle');

      const handleSubmit = async (e) => {
        e.preventDefault();

        // Bot caught the honeypot — pretend success, submit nothing.
        if (form._gotcha) {
          setStatus('success');
          setForm({name:'', email:'', message:'', _gotcha:''});
          setTimeout(() => setStatus('idle'), 6000);
          return;
        }

        setStatus('sending');
        try {
          const res = await fetch(FORMSPREE, {
            method:'POST',
            body: JSON.stringify(form),
            headers: {'Accept':'application/json', 'Content-Type':'application/json'}
          });
          if (res.ok) {
            setTimeout(() => { setStatus('success'); setForm({name:'',email:'',message:'',_gotcha:''}); }, 1200);
            setTimeout(() => setStatus('idle'), 6000);
          } else { throw new Error(); }
        } catch {
          setStatus('error');
          setTimeout(() => setStatus('idle'), 3000);
        }
      };

      if (status === 'sending') {
        return (
          <div className="card p-6 min-h-[380px] flex flex-col items-center justify-center gap-4">
            <div className="spinner"></div>
            <p className="text-[#3ddc84] text-sm font-mono tracking-widest">ENCRYPTING & SENDING...</p>
          </div>
        );
      }

      if (status === 'success') {
        return (
          <div className="card p-6 min-h-[380px] flex flex-col items-center justify-center gap-5 text-center">
            <div className="relative">
              <div className="absolute inset-0 bg-[#3ddc84] blur-3xl opacity-20 animate-ping"></div>
              <span className="text-6xl block relative">🚀</span>
            </div>
            <h3 className="text-2xl font-bold font-mono text-[#3ddc84]">TRANSMISSION_COMPLETE</h3>
            <p className="text-neutral-400 font-mono text-sm max-w-[280px]">Your data has been successfully pushed to the master branch.</p>
            <button onClick={() => setStatus('idle')} className="text-[#3ddc84]/50 hover:text-[#3ddc84] text-xs font-mono underline transition-colors">// Send another message?</button>
          </div>
        );
      }

      if (status === 'error') {
        return (
          <div className="card p-6 min-h-[380px] flex flex-col items-center justify-center gap-5 text-center">
            <span className="text-5xl">⚠️</span>
            <h3 className="text-xl font-bold font-mono text-[#ff5370]">TRANSMISSION_FAILED</h3>
            <p className="text-neutral-400 font-mono text-sm">Something went wrong. Please try again.</p>
            <button onClick={() => setStatus('idle')} className="btn-ghost text-sm">Try Again</button>
          </div>
        );
      }

      return (
        <div className="card p-6">
          <form onSubmit={handleSubmit} noValidate>
            <div className="mb-4">
              <label htmlFor="name" className="block text-sm font-mono text-neutral-400 mb-2">/usr/name</label>
              <input id="name" name="name" required type="text" value={form.name} onChange={e => setForm({...form, name:e.target.value})} className="form-input" placeholder="Your name" aria-required="true"/>
            </div>
            <div className="mb-4">
              <label htmlFor="email" className="block text-sm font-mono text-neutral-400 mb-2">/usr/email</label>
              <input id="email" name="email" required type="email" value={form.email} onChange={e => setForm({...form, email:e.target.value})} className="form-input" placeholder="you@example.com" aria-required="true"/>
            </div>
            <div className="mb-4">
              <label htmlFor="message" className="block text-sm font-mono text-neutral-400 mb-2">/usr/message</label>
              <textarea id="message" name="message" required rows="4" value={form.message} onChange={e => setForm({...form, message:e.target.value})} className="form-input resize-none" placeholder="Say hello..." aria-required="true"/>
            </div>
            {/* Honeypot - stays empty and hidden for real humans */}
            <div className="hp-field" aria-hidden="true">
              <label htmlFor="company">Company</label>
              <input id="company" name="_gotcha" type="text" tabIndex="-1" autoComplete="off" value={form._gotcha} onChange={e => setForm({...form, _gotcha:e.target.value})}/>
            </div>
            <button type="submit" className="cta-btn w-full py-3.5 relative overflow-hidden group">
              <span className="relative z-10 font-mono font-bold">SEND_PACKET --execute</span>
              <div className="absolute inset-0 bg-[#3ddc84] translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
          </form>
        </div>
      );

    /* ========== Footer ========== */

      <footer className="border-t border-[#3ddc84]/8 py-6">
        <div className="mx-auto max-w-6xl px-4 flex flex-col md:flex-row items-center justify-between gap-3 text-sm text-neutral-500 font-mono">
          <p>© 2025 Moaz Ragab Kamel</p>
          <p><span style={{color:'#c792ea'}}>const</span> madeWith = <span style={{color:'#c3e88d'}}>"love, curiosity & dedication ❤️"</span>;</p>
        </div>
      </footer>
    );

    /* ========== Scroll to Top ========== */
    const ScrollTop = () => {
      const [show, setShow] = useState(false);
      useEffect(() => {
        const fn = () => setShow(window.scrollY > 400);
        window.addEventListener('scroll', fn, {passive:true});
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <button className={`scroll-top ${show?'show':''}`} onClick={() => window.scrollTo({top:0, behavior:'smooth'})} aria-label="Scroll to top">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#000"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
        </button>
      );
    };

    /* ========== App ========== */
    const App = () => {
      const [intro, setIntro] = useState(true);
      const [theme, setTheme] = useState(() => {
        try {
          const s = localStorage.getItem('portfolio-theme');
          if (s) return s;
        } catch {}
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      });

      useEffect(() => {
        document.body.classList.toggle('light', theme === 'light');
        try { localStorage.setItem('portfolio-theme', theme); } catch {}
      }, [theme]);

      useEffect(() => {
        const obs = new IntersectionObserver(
          entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('active'); }),
          { threshold: .1, rootMargin: '0px 0px -40px 0px' }
        );
        setTimeout(() => document.querySelectorAll('.reveal').forEach(el => obs.observe(el)), 100);
        return () => obs.disconnect();
      }, [intro]);

      const toggleTheme = useCallback(() => setTheme(t => t==='dark'?'light':'dark'), []);

      return (
        <>
          {intro && <CinematicIntro onDone={() => setIntro(false)}/>}
          <Navbar theme={theme} toggleTheme={toggleTheme}/>
          <main>
            <Hero/>
            <About/>
            <Skills/>
            <Projects/>
            <Experience/>
            <Education/>
            <Contact/>
          </main>
          <Footer/>
          <ScrollTop/>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
